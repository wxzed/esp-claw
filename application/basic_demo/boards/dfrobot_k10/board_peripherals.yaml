# Peripherals Configuration for DFRobot K10
peripherals:

  # I2C bus (port 1) — IO expander (TCA9555); mic/ES7243E device removed for speaker-only bring-up
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 1
      pins:
        sda: 47   # AUDIO_CODEC_I2C_SDA_PIN
        scl: 48   # AUDIO_CODEC_I2C_SCL_PIN

  # I2S output — STD Philips, 24 kHz; NS4168 on DOUT (GPIO45).
  # Mono stream on right slot only (no stereo interleaved buffer); matches board request for right-channel playback.
  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out
    config: &i2s0_config
      port: 0
      sample_rate_hz: 24000
      mclk_multiple: 256
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_MONO
      slot_mask: I2S_STD_SLOT_RIGHT
      ws_width: 16
      left_align: true
      bit_shift: true
      pins:
        mclk: -1   # TX path does not use MCLK on K10
        bclk: 0    # AUDIO_I2S_GPIO_BCLK
        ws: 38     # AUDIO_I2S_GPIO_WS
        dout: 45   # AUDIO_I2S_GPIO_DOUT
        din: -1    # unused for TX

  # SPI bus — ILI9341 320×240 LCD
  - name: spi_master
    type: spi
    role: master
    config:
      spi_bus_config:
        spi_port: SPI3_HOST
        mosi_io_num: 21
        miso_io_num: -1
        sclk_io_num: 12
        max_transfer_sz: 153600   # 320 * 240 * 2

  # LED strip RMT TX — 3× WS2812 on GPIO46
  - name: rmt_tx
    type: rmt
    role: tx
    config:
      gpio_num: 46   # BUILTIN_LED_GPIO
      clk_src: RMT_CLK_SRC_DEFAULT
      resolution_hz: 10000000
      mem_block_symbols: 64
      trans_queue_depth: 4
      intr_priority: 1
      flags:
        invert_out: false
        with_dma: true
        io_loop_back: false
        io_od_mode: false
        allow_pd: false
        init_level: false
