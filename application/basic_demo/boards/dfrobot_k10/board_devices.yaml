# Devices Configuration for DFRobot K10
version: 1.0.0
devices:

  # IO Expander: TCA9555 (16-bit, I2C addr 0x20)
  # PIN0/1  = output (camera/peripheral reset)
  # PIN2    = Button A input
  # PIN12   = Button B input
  - name: gpio_expander
    chip: tca9555
    type: gpio_expander
    version: default
    dependencies:
      espressif/esp_io_expander_tca95xx_16bit:
        version: "*"
        require: public
    config:
      max_pins: 16
      output_io_mask: [0, 1]
      output_io_level_mask: [1, 1]
      input_io_mask: [2, 12]
    peripherals:
      - name: i2c_master
        i2c_addr: [0x40]   # 8-bit address for TCA9555 ADDRESS_000 (7-bit 0x20)

  # Audio DAC output path (speaker), aligned with original df-k10:
  # No external DAC control over I2C; output is pushed directly via I2S TX.
  # Keep audio_dac handle for upper-layer playback path.
  - name: audio_dac
    chip: internal
    type: audio_codec
    version: default
    config:
      adc_enabled: false
      dac_enabled: true
      dac_max_channel: 1
      dac_channel_mask: "10"
      dac_init_gain: 0
      mclk_enabled: false
    peripherals:
      - name: i2s_audio_out

  # LCD: ILI9341 320×240 via SPI3
  - name: display_lcd
    chip: ili9341
    type: display_lcd
    sub_type: spi
    version: default
    dependencies:
      espressif/esp_lcd_ili9341: "*"
    config:
      mirror_x: false
      mirror_y: true
      x_max: 240
      y_max: 320
      invert_color: false
      io_spi_config:
        cs_gpio_num: 14
        dc_gpio_num: 13
        spi_mode: 0
        pclk_hz: 40000000
        flags:
          sio_mode: false
      lcd_panel_config:
        reset_gpio_num: -1
        rgb_ele_order: LCD_RGB_ELEMENT_ORDER_BGR
        bits_per_pixel: 16
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        flags:
          reset_active_high: false
    peripherals:
      - name: spi_master

  # LED strip: 3× WS2812 RGB (circular strip)
  - name: led_strip
    chip: ws2812
    type: custom
    version: default
    init_skip: true
    dependencies:
      espressif/led_strip:
        version: "^3.0"
        require: public
    config:
      max_leds: 3
    peripherals:
      - name: rmt_tx
